[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
no_implicit_optional = True
check_untyped_defs = False

# Per-module options
[mypy-tests.*]
ignore_errors = True

[mypy-adapters.*]
# Allow Any returns in adapters (they interface with external libraries)
warn_return_any = False
disallow_any_generics = False

[mypy-core.factory]
# Factory has complex type unions
warn_return_any = False

[mypy-core.text_chunker]
# Text chunker has complex internal types
warn_return_any = False
