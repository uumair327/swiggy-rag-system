name: Deploy API Backend

on:
  push:
    branches: [main]
    paths:
      - 'api_server.py'
      - 'core/**'
      - 'ports/**'
      - 'adapters/**'
      - 'requirements.txt'
      - 'Dockerfile.api'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-api-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, Push, Deploy API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger cloud deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CLOUD_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing required secret: CLOUD_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            --url "$DEPLOY_HOOK_URL"

      - name: Post-deploy health check
        env:
          HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "API_HEALTHCHECK_URL not set; skipping health check"
            exit 0
          fi

          for i in $(seq 1 20); do
            if curl --fail --silent "$HEALTHCHECK_URL" | grep -q '"status":"ok"'; then
              echo "API is healthy"
              exit 0
            fi

            echo "Waiting for API to become healthy ($i/20)..."
            sleep 15
          done

          echo "API health check failed"
          exit 1
